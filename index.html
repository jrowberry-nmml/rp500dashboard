<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NM RP-500 Distribution Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root {
    --bg: #f4f6f9; --surface: #ffffff; --border: #e0e4eb;
    --primary: #1a6fc4; --primary-light: #e8f0fb; --primary-dark: #134f8f;
    --text: #1a2233; --text-sub: #5a6478; --text-muted: #9ba3b4;
    --green: #1a9e6b; --red: #d44040; --orange: #e07a10;
    --shadow: 0 1px 4px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.05);
    --radius: 10px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
         background: var(--bg); color: var(--text); font-size: 14px; }

  /* ── Layout ── */
  .app { display: flex; flex-direction: column; min-height: 100vh; }
  header { background: var(--primary); color: #fff; padding: 14px 24px;
           display: flex; align-items: center; gap: 14px; box-shadow: 0 2px 8px rgba(0,0,0,.15); }
  header h1 { font-size: 1.15rem; font-weight: 600; letter-spacing: .01em; }
  header span { font-size: .8rem; opacity: .75; margin-left: auto; }
  .main { display: flex; flex: 1; gap: 0; }

  /* ── Sidebar ── */
  .sidebar { width: 280px; min-width: 240px; background: var(--surface);
             border-right: 1px solid var(--border); display: flex; flex-direction: column;
             padding: 16px 14px; gap: 10px; overflow: hidden; }
  .sidebar h3 { font-size: .72rem; font-weight: 700; text-transform: uppercase;
                letter-spacing: .06em; color: var(--text-muted); margin-bottom: 2px; }
  .search-wrap { position: relative; }
  .search-wrap input { width: 100%; padding: 8px 10px 8px 32px; border: 1px solid var(--border);
                        border-radius: 7px; font-size: .85rem; background: var(--bg);
                        color: var(--text); outline: none; }
  .search-wrap input:focus { border-color: var(--primary); background: #fff; }
  .search-wrap::before { content: "🔍"; position: absolute; left: 9px; top: 50%;
                          transform: translateY(-50%); font-size: .75rem; }
  .category-tabs { display: flex; gap: 4px; }
  .cat-btn { flex: 1; padding: 5px 2px; border: 1px solid var(--border); border-radius: 6px;
             background: var(--bg); font-size: .72rem; font-weight: 600; cursor: pointer;
             color: var(--text-sub); text-align: center; transition: all .15s; }
  .cat-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
  .entity-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 2px;
                 min-height: 0; }
  .select-all-row { display:flex; align-items:center; justify-content:space-between;
                  padding:6px 0 4px; border-bottom:1px solid var(--border); margin-bottom:4px; }
  .select-all-btn { font-size:.78rem; color:var(--accent); background:none; border:none;
                    cursor:pointer; padding:0; font-weight:500; }
  .select-all-btn:hover { text-decoration:underline; }
  .visible-count { font-size:.75rem; color:var(--text-muted); }
  .table-export-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
  .table-export-row h3 { margin:0; font-size:.88rem; font-weight:600; }
  .export-btns { display:flex; gap:6px; }
  .export-btn { font-size:.75rem; padding:4px 10px; border:1px solid var(--border);
                border-radius:5px; background:var(--surface); cursor:pointer;
                color:var(--text); font-weight:500; }
  .export-btn:hover { background:var(--accent); color:#fff; border-color:var(--accent); }

  .entity-item { display: flex; align-items: center; gap: 7px; padding: 6px 8px;
                 border-radius: 6px; cursor: pointer; transition: background .1s; }
  .entity-item:hover { background: var(--primary-light); }
  .entity-item.selected { background: var(--primary-light); }
  .entity-item input[type=checkbox] { accent-color: var(--primary); cursor: pointer; flex-shrink: 0; }
  .entity-item label { font-size: .82rem; cursor: pointer; line-height: 1.3; flex: 1; }
  .entity-item .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .no-results { text-align: center; color: var(--text-muted); padding: 20px 0; font-size: .82rem; }

  .selected-section { border-top: 1px solid var(--border); padding-top: 10px; }
  .chips { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; min-height: 28px; }
  .chip { display: flex; align-items: center; gap: 4px; background: var(--primary);
           color: #fff; border-radius: 20px; padding: 3px 8px 3px 10px;
           font-size: .75rem; font-weight: 500; }
  .chip button { background: none; border: none; color: rgba(255,255,255,.8); cursor: pointer;
                  font-size: .85rem; padding: 0; line-height: 1; }
  .chip button:hover { color: #fff; }
  .chip-dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,.6); }
  .clear-btn { font-size: .75rem; color: var(--primary); border: none; background: none;
               cursor: pointer; padding: 2px 0; text-decoration: underline; }

  /* ── Content ── */
  .content { flex: 1; padding: 20px 24px; display: flex; flex-direction: column;
              gap: 18px; min-width: 0; overflow-y: auto; }
  .controls-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .control-group { display: flex; flex-direction: column; gap: 4px; }
  .control-group label { font-size: .72rem; font-weight: 600; text-transform: uppercase;
                          letter-spacing: .05em; color: var(--text-muted); }
  .toggle-group { display: flex; border: 1px solid var(--border); border-radius: 7px;
                   overflow: hidden; }
  .toggle-btn { padding: 7px 14px; background: var(--bg); border: none; cursor: pointer;
                 font-size: .82rem; font-weight: 500; color: var(--text-sub); transition: all .15s; }
  .toggle-btn.active { background: var(--primary); color: #fff; }
  select.control-select { padding: 7px 10px; border: 1px solid var(--border); border-radius: 7px;
                            background: var(--bg); font-size: .82rem; color: var(--text);
                            outline: none; cursor: pointer; }
  select.control-select:focus { border-color: var(--primary); }

  /* ── Stat cards ── */
  .stats-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
               padding: 14px 16px; box-shadow: var(--shadow); }
  .stat-wide { grid-column: span 2; }
  @media (max-width: 700px) { .stat-wide { grid-column: span 1; } }
  .stat-card .label { font-size: .72rem; font-weight: 600; text-transform: uppercase;
                       letter-spacing: .05em; color: var(--text-muted); margin-bottom: 6px; }
  .stat-card .value { font-size: 1.35rem; font-weight: 700; color: var(--text); }
  .stat-card .sub { font-size: .75rem; color: var(--text-sub); margin-top: 3px; }
  .stat-card .delta { font-size: .78rem; font-weight: 600; margin-top: 4px; }
  .delta.up { color: var(--green); } .delta.down { color: var(--red); }

  /* ── Chart ── */
  .chart-card { background: var(--surface); border: 1px solid var(--border);
                border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); flex: 1; }
  .chart-header { display: flex; align-items: center; justify-content: space-between;
                   margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
  .chart-title { font-size: .95rem; font-weight: 600; }
  .chart-subtitle { font-size: .78rem; color: var(--text-sub); }
  .chart-wrap { position: relative; height: 360px; }

  /* ── Table ── */
  .table-card { background: var(--surface); border: 1px solid var(--border);
                border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); }
  .table-card h3 { font-size: .88rem; font-weight: 600; margin-bottom: 12px; }
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: .8rem; }
  th { background: var(--bg); padding: 8px 10px; text-align: right; font-weight: 600;
       color: var(--text-sub); font-size: .72rem; text-transform: uppercase; letter-spacing: .04em;
       border-bottom: 2px solid var(--border); white-space: nowrap; }
  th:first-child { text-align: left; }
  td { padding: 7px 10px; text-align: right; border-bottom: 1px solid var(--border);
       white-space: nowrap; }
  td:first-child { text-align: left; font-weight: 500; }
  td .ent-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%;
                margin-right: 6px; }
  tr:last-child td { border-bottom: none; font-weight: 700; background: var(--bg); }
  tr:hover:not(:last-child) td { background: var(--primary-light); }

  /* ── Empty state ── */
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
  .empty-state .icon { font-size: 2.5rem; margin-bottom: 10px; }
  .empty-state p { font-size: .9rem; }

  /* ── Scrollbar ── */
  .entity-list::-webkit-scrollbar { width: 5px; }
  .entity-list::-webkit-scrollbar-track { background: transparent; }
  .entity-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>
<div class="app">
  <header>
    <div>
      <h1>New Mexico GRT — Local Government Distribution</h1>
    </div>
    <span>RP-500 · Jul '19 – Apr '26 · 82 months</span>
  </header>

  <div class="main">
    <!-- Sidebar -->
    <aside class="sidebar">
      <h3>Entities</h3>
      <div class="search-wrap">
        <input id="entitySearch" type="text" placeholder="Search entities…" oninput="filterEntities()">
      </div>
      <div class="category-tabs">
        <button class="cat-btn active" onclick="setCat('all',this)">All</button>
        <button class="cat-btn" onclick="setCat('counties',this)">Counties</button>
        <button class="cat-btn" onclick="setCat('munis',this)">Municipalities</button>
        <button class="cat-btn" onclick="setCat('other',this)">Other</button>
      </div>
      <div class="select-all-row">
        <button class="select-all-btn" id="selectAllBtn" onclick="selectAll()">Select All</button>
        <span class="visible-count" id="visibleCount"></span>
      </div>
      <div class="entity-list" id="entityList"></div>

      <div class="selected-section">
        <div style="display:flex;align-items:center;justify-content:space-between">
          <h3>Selected (<span id="selCount">0</span>)</h3>
          <button class="clear-btn" onclick="clearAll()">Clear all</button>
        </div>
        <div class="chips" id="chips"></div>
      </div>
    </aside>

    <!-- Main content -->
    <div class="content">
      <!-- Controls -->
      <div class="controls-row">
        <div class="control-group">
          <label>View</label>
          <div class="toggle-group">
            <button class="toggle-btn active" onclick="setView('monthly',this)">Monthly</button>
            <button class="toggle-btn" onclick="setView('fiscal',this)">Fiscal Year</button>
          </div>
        </div>
        <div class="control-group">
          <label>From</label>
          <select class="control-select" id="fromFilter" onchange="renderAll()"></select>
        </div>
        <div class="control-group">
          <label>To</label>
          <select class="control-select" id="toFilter" onchange="renderAll()"></select>
        </div>
        <div class="control-group" style="margin-left:auto">
          <label>Chart type</label>
          <div class="toggle-group">
            <button class="toggle-btn active" onclick="setChartType('line',this)">Line</button>
            <button class="toggle-btn" onclick="setChartType('bar',this)">Bar</button>
          </div>
        </div>
      </div>

      <!-- Stat cards -->
      <div class="stats-row" id="statsRow"></div>

      <!-- Chart -->
      <div class="chart-card">
        <div class="chart-header">
          <div>
            <div class="chart-title" id="chartTitle">Total Distributed</div>
            <div class="chart-subtitle" id="chartSub">Select one or more entities to begin</div>
          </div>
        </div>
        <div class="chart-wrap">
          <canvas id="mainChart"></canvas>
          <div class="empty-state" id="emptyState">
            <div class="icon">📊</div>
            <p>Select entities from the left panel to view distribution trends</p>
          </div>
        </div>
      </div>

      <!-- Summary table -->
      <div id="tableCard" class="table-card" style="margin-top:24px; display:none;">
        <h3 id="tableTitle">Distribution Summary</h3>
        <div class="table-wrap">
          <table id="summaryTable"></table>
        </div>
      </div>
    </div>
  </div>
</div>

function fmtFull(v) {
  if (v == null || isNaN(v)) return '—';
  return '$' + Math.round(v).toLocaleString();
}

// ── Build from/to selectors ───────────────────────────────
function buildFilters() {
  const months = D.months;
  const fromEl = document.getElementById('fromFilter');
  const toEl   = document.getElementById('toFilter');

  months.forEach(m => {
    fromEl.add(new Option(monthLabel(m), m));
    toEl.add(new Option(monthLabel(m), m));
  });
  fromEl.value = months[0];
  toEl.value   = months[months.length - 1];
}

function getFilteredMonths() {
  const from = document.getElementById('fromFilter').value;
  const to   = document.getElementById('toFilter').value;
  return D.months.filter(m => m >= from && m <= to);
}

// ── Entity list ───────────────────────────────────────────
function getCatEntities() {
  if (currentCat === 'counties') return D.counties;
  if (currentCat === 'munis')    return D.munis;
  if (currentCat === 'other')    return D.other;
  return D.entities;
}

function filterEntities() {
  const q = document.getElementById('entitySearch').value.toLowerCase();
  const pool = getCatEntities();
  const filtered = q ? pool.filter(e => e.toLowerCase().includes(q)) : pool;
  renderEntityList(filtered);
}

function renderEntityList(list) {
  const el = document.getElementById('entityList');
  el.innerHTML = '';
  if (!list.length) {
    el.innerHTML = '<div class="no-results">No entities found</div>';
    return;
  }
  list.forEach((e, i) => {
    const idx = selected.indexOf(e);
    const isSelected = idx >= 0;
    const color = isSelected ? PALETTE[idx % PALETTE.length] : 'transparent';
    const div = document.createElement('div');
    div.className = 'entity-item' + (isSelected ? ' selected' : '');
    div.innerHTML = `
      <input type="checkbox" id="chk_${i}" ${isSelected?'checked':''} onchange="toggleEntity('${e.replace(/'/g,"\\'")}', this)">
      <span class="dot" style="background:${color}"></span>
      <label for="chk_${i}">${e}</label>`;
    el.appendChild(div);
  });
  const allBtn = document.getElementById('selectAllBtn');
  const countEl = document.getElementById('visibleCount');
  if (allBtn) {
    const allSel = list.every(e => selected.includes(e));
    allBtn.textContent = allSel ? 'Deselect All' : 'Select All';
  }
  if (countEl) countEl.textContent = list.length + ' shown';
}

function setCat(cat, btn) {
  currentCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('entitySearch').value = '';
  filterEntities();
}

function toggleEntity(e, cb) {
  const idx = selected.indexOf(e);
  if (cb.checked && idx < 0) {
    if (selected.length >= 14) { cb.checked = false; alert('Max 14 entities for readability.'); return; }
    selected.push(e);
  } else if (!cb.checked && idx >= 0) {
    selected.splice(idx, 1);
  }
  filterEntities();
  renderChips();
  renderAll();
}

function removeEntity(e) {
  const idx = selected.indexOf(e);
  if (idx >= 0) selected.splice(idx, 1);
  filterEntities();
  renderChips();
  renderAll();
}

function clearAll() {
  selected = [];
  filterEntities();
  renderChips();
  renderAll();
}

function selectAll() {
  const q = document.getElementById('entitySearch').value.toLowerCase();
  const pool = getCatEntities();
  const visible = q ? pool.filter(e => e.toLowerCase().includes(q)) : pool;
  const allSel = visible.every(e => selected.includes(e));
  if (allSel) {
    selected = selected.filter(e => !visible.includes(e));
  } else {
    visible.forEach(e => { if (!selected.includes(e)) selected.push(e); });
  }
  filterEntities();
  renderChips();
  renderAll();
}

function renderChips() {
  const el = document.getElementById('chips');
  document.getElementById('selCount').textContent = selected.length;
  el.innerHTML = selected.map((e, i) => {
    const color = PALETTE[i % PALETTE.length];
    const short = e.length > 22 ? e.slice(0,20)+'…' : e;
    return `<span class="chip" style="background:${color}">
      <span class="chip-dot"></span>${short}
      <button onclick="removeEntity('${e.replace(/'/g,"\\'")}')">×</button>
    </span>`;
  }).join('');
}

// ── View / chart type controls ────────────────────────────
function setView(v, btn) {
  viewMode = v;
  document.querySelectorAll('.toggle-group')[0]
    .querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderAll();
}
function setChartType(t, btn) {
  chartType = t;
  document.querySelectorAll('.toggle-group')[1]
    .querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderAll();
}

// ── Data helpers ──────────────────────────────────────────
function getMonthlyData(entity, months) {
  const ed = D.byEntity[entity] || {};
  return months.map(m => ed[m] ?? null);
}

function getFYData(entity, months) {
  const ed = D.byEntity[entity] || {};
  const fyMap = {};
  months.forEach(m => {
    const fy = getFY(m);
    fyMap[fy] = (fyMap[fy] || 0) + (ed[m] || 0);
  });
  return fyMap;
}

function getAllFYs(months) {
  return [...new Set(months.map(getFY))].sort();
}

// ── Main render ───────────────────────────────────────────
function renderAll() {
  renderStats();
  renderChart();
  renderTable();
}

function renderStats() {
  const el = document.getElementById('statsRow');
  if (!selected.length) { el.innerHTML = ''; return; }

  const months = getFilteredMonths();
  const lastMonth = months[months.length - 1];
  const prevMonth = months[months.length - 2];

  const entityData = selected.map((e, i) => {
    const ed = D.byEntity[e] || {};
    const last = ed[lastMonth] || 0;
    const prev = prevMonth != null ? (ed[prevMonth] || 0) : null;
    const mom  = (prev != null && prev !== 0) ? (last - prev) / prev * 100 : null;
    return { name: e, last, prev, mom, color: PALETTE[i % PALETTE.length] };
  });

  let latestHtml;
  if (selected.length === 1) {
    const d = entityData[0];
    const momHtml = d.mom != null
      ? `<div class="delta ${d.mom>=0?'up':'down'}">${d.mom>=0?'▲':'▼'} ${Math.abs(d.mom).toFixed(1)}% MoM</div>`
      : '';
    latestHtml = `
    <div class="stat-card">
      <div class="label">Latest Month</div>
      <div class="value">${fmt(d.last)}</div>
      <div class="sub">${monthLabel(lastMonth)}</div>
      ${momHtml}
    </div>`;
  } else {
    const rows = entityData.map(d => {
      const momHtml = d.mom != null
        ? `<span class="delta ${d.mom>=0?'up':'down'}" style="font-size:.68rem;margin-left:4px">${d.mom>=0?'▲':'▼'}${Math.abs(d.mom).toFixed(1)}%</span>`
        : '';
      return `<div style="display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid var(--border);">
        <span style="width:8px;height:8px;border-radius:50%;background:${d.color};flex-shrink:0;display:inline-block"></span>
        <span style="flex:1;font-size:.75rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${d.name}">${d.name}</span>
        <span style="font-size:.8rem;font-weight:600;white-space:nowrap">${fmt(d.last)}${momHtml}</span>
      </div>`;
    }).join('');
    latestHtml = `
    <div class="stat-card stat-wide">
      <div class="label">Latest Month — ${monthLabel(lastMonth)}</div>
      <div style="margin-top:8px">${rows}</div>
    </div>`;
  }

  const entRows = entityData.map(d =>
    `<div style="display:flex;align-items:center;gap:6px;padding:3px 0;">
      <span style="width:8px;height:8px;border-radius:50%;background:${d.color};flex-shrink:0;display:inline-block"></span>
      <span style="font-size:.78rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${d.name}">${d.name}</span>
    </div>`
  ).join('');

  el.innerHTML = `
    ${latestHtml}
    <div class="stat-card">
      <div class="label">Selected Entities (${selected.length})</div>
      <div style="margin-top:6px">${entRows}</div>
    </div>`;
}

function renderChart() {
  const canvas = document.getElementById('mainChart');
  const emptyEl = document.getElementById('emptyState');
  const sub = document.getElementById('chartSub');

  if (!selected.length) {
    emptyEl.style.display = 'flex';
    emptyEl.style.flexDirection = 'column';
    emptyEl.style.justifyContent = 'center';
    emptyEl.style.alignItems = 'center';
    canvas.style.display = 'none';
    if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
    return;
  }
  emptyEl.style.display = 'none';
  canvas.style.display = 'block';

  const months = getFilteredMonths();
  let labels, datasets;

  if (viewMode === 'monthly') {
    labels = months.map(monthLabel);
    datasets = selected.map((e, i) => ({
      label: e,
      data: getMonthlyData(e, months),
      borderColor: PALETTE[i % PALETTE.length],
      backgroundColor: PALETTE[i % PALETTE.length] + '22',
      borderWidth: 2,
      pointRadius: months.length > 40 ? 0 : 3,
      pointHoverRadius: 5,
      tension: 0.3,
      fill: selected.length === 1 && chartType === 'line',
      spanGaps: true,
    }));
    sub.textContent = `Monthly · ${monthLabel(months[0])} – ${monthLabel(months[months.length-1])}`;
  } else {
    const fys = getAllFYs(months);
    labels = fys.map(fyLabel);
    datasets = selected.map((e, i) => {
      const fyMap = getFYData(e, months);
      return {
        label: e,
        data: fys.map(fy => fyMap[fy] || 0),
        backgroundColor: PALETTE[i % PALETTE.length] + (chartType==='bar' ? 'cc' : '22'),
        borderColor: PALETTE[i % PALETTE.length],
        borderWidth: chartType==='bar' ? 0 : 2,
        tension: 0.3,
        fill: selected.length === 1 && chartType === 'line',
      };
    });
    sub.textContent = `Fiscal Year (Jul–Jun) · FY${fys[0]}–FY${fys[fys.length-1]}`;
  }

  const type = (chartType === 'bar' || viewMode === 'fiscal' && chartType === 'bar') ? 'bar' : 'line';

  if (chartInstance) chartInstance.destroy();
  chartInstance = new Chart(canvas, {
    type: type,
    data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          display: selected.length > 1,
          position: 'top',
          labels: { boxWidth: 12, font: { size: 11 }, padding: 12 }
        },
        tooltip: {
          callbacks: {
            label: ctx => ` ${ctx.dataset.label}: ${fmtFull(ctx.parsed.y)}`
          }
        }
      },
      scales: {
        x: { grid: { display: false }, ticks: { font: { size: 11 } } },
        y: {
          min: 0,
          grid: { color: '#e8ecf2' },
          ticks: {
            font: { size: 11 },
            callback: v => fmt(v)
          }
        }
      }
    }
  });
}

function renderTable() {
  const el = document.getElementById('tableCard');
  if (!selected.length) { el.style.display = 'none'; el.innerHTML = ''; return; }

  const months = getFilteredMonths();

  if (viewMode === 'monthly') {
    const cols = months;
    const rows = selected.map((e, i) => {
      const ed = D.byEntity[e] || {};
      const vals = cols.map(m => ed[m] || 0);
      const total = vals.reduce((a,b)=>a+b, 0);
      return { name: e, color: PALETTE[i % PALETTE.length], vals, total };
    });
    const totals = cols.map((m, ci) => rows.reduce((s,r)=>s+r.vals[ci],0));
    const grandTotal = totals.reduce((a,b)=>a+b,0);

    const headerCols = cols.map(m => `<th>${monthLabel(m)}</th>`).join('');
    const bodyRows = rows.map(r => `
      <tr>
        <td><span class="ent-dot" style="background:${r.color}"></span>${r.name}</td>
        ${r.vals.map(v=>`<td>${fmt(v)}</td>`).join('')}
        <td><strong>${fmt(r.total)}</strong></td>
      </tr>`).join('');
    const totalsRow = `
      <tr>
        <td>Total</td>
        ${totals.map(v=>`<td>${fmt(v)}</td>`).join('')}
        <td>${fmt(grandTotal)}</td>
      </tr>`;

    el.style.display = 'block';
    el.innerHTML = `
        <div class="table-export-row">
          <h3>Monthly Total Distributed</h3>
          <div class="export-btns">
            <button class="export-btn" onclick="exportCSV()">⬇ CSV</button>
            <button class="export-btn" onclick="exportExcel()">⬇ Excel</button>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Entity</th>${headerCols}<th>Total</th></tr></thead>
            <tbody>${bodyRows}${totalsRow}</tbody>
          </table>
        </div>`;

  } else {
    const fys = [...new Set(months.map(getFY))].sort();
    const rows = selected.map((e, i) => {
      const ed = D.byEntity[e] || {};
      const fyTotals = fys.map(fy => {
        const fyMonths = months.filter(m => getFY(m) === fy);
        return fyMonths.reduce((s,m) => s+(ed[m]||0), 0);
      });
      const total = fyTotals.reduce((a,b)=>a+b,0);
      return { name: e, color: PALETTE[i % PALETTE.length], fyTotals, total };
    });
    const grandFyTotals = fys.map((fy, fi) => rows.reduce((s,r)=>s+r.fyTotals[fi],0));
    const grandTotal = grandFyTotals.reduce((a,b)=>a+b,0);

    const headerCols = fys.map(fy => `<th>${fyLabel(fy)}</th>`).join('');
    const bodyRows = rows.map(r => `
      <tr>
        <td><span class="ent-dot" style="background:${r.color}"></span>${r.name}</td>
        ${r.fyTotals.map(v=>`<td>${fmt(v)}</td>`).join('')}
        <td><strong>${fmt(r.total)}</strong></td>
      </tr>`).join('');
    const totalsRow = `
      <tr>
        <td>Total</td>
        ${grandFyTotals.map(v=>`<td>${fmt(v)}</td>`).join('')}
        <td>${fmt(grandTotal)}</td>
      </tr>`;

    el.style.display = 'block';
    el.innerHTML = `
        <div class="table-export-row">
          <h3>Fiscal Year Total Distributed</h3>
          <div class="export-btns">
            <button class="export-btn" onclick="exportCSV()">⬇ CSV</button>
            <button class="export-btn" onclick="exportExcel()">⬇ Excel</button>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Entity</th>${headerCols}<th>Total</th></tr></thead>
            <tbody>${bodyRows}${totalsRow}</tbody>
          </table>
        </div>`;
  }
}

// ── Export helpers ────────────────────────────────────────
function getExportData() {
  const months = getFilteredMonths();
  if (viewMode === 'monthly') {
    const cols = months;
    const header = ['Entity', ...cols.map(monthLabel), 'Total'];
    const rows = selected.map(e => {
      const ed = D.byEntity[e] || {};
      const vals = cols.map(m => ed[m] || 0);
      const total = vals.reduce((a,b)=>a+b,0);
      return [e, ...vals, total];
    });
    const totals = cols.map((m,ci) => rows.reduce((s,r)=>s+r[ci+1],0));
    rows.push(['Total', ...totals, totals.reduce((a,b)=>a+b,0)]);
    return { header, rows, title: 'Monthly_Total_Distributed' };
  } else {
    const fys = [...new Set(months.map(getFY))].sort();
    const header = ['Entity', ...fys.map(fyLabel), 'Total'];
    const rows = selected.map(e => {
      const ed = D.byEntity[e] || {};
      const fyTotals = fys.map(fy => months.filter(m=>getFY(m)===fy).reduce((s,m)=>s+(ed[m]||0),0));
      const total = fyTotals.reduce((a,b)=>a+b,0);
      return [e, ...fyTotals, total];
    });
    const grandFyTotals = fys.map((fy,fi) => rows.reduce((s,r)=>s+r[fi+1],0));
    rows.push(['Total', ...grandFyTotals, grandFyTotals.reduce((a,b)=>a+b,0)]);
    return { header, rows, title: 'FiscalYear_Total_Distributed' };
  }
}

function exportCSV() {
  const { header, rows, title } = getExportData();
  const all = [header, ...rows];
  const csv = all.map(r => r.map(v => {
    const s = typeof v === 'number' ? v.toFixed(2) : String(v);
    return '"' + s.replace(/"/g, '""') + '"';
  }).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'RP500_' + title + '.csv';
  a.click();
}

function exportExcel() {
  const { header, rows, title } = getExportData();
  const wsData = [header, ...rows];
  const ws = XLSX.utils.aoa_to_sheet(wsData);
  const numFmt = '$#,##0.00';
  wsData.forEach((row, ri) => {
    row.forEach((val, ci) => {
      if (ri > 0 && ci > 0 && typeof val === 'number') {
        const cell = ws[XLSX.utils.encode_cell({r:ri, c:ci})];
        if (cell) cell.z = numFmt;
      }
    });
  });
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'RP500');
  XLSX.writeFile(wb, 'RP500_' + title + '.xlsx');
}

// ── Startup ───────────────────────────────────────────────
buildFilters();
filterEntities();
</script>
</body>
</html>
